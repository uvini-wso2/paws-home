openapi: 3.0.0

info:
  title: Paws and Homes API
  version: 1.0.0
  description: Backend API for the Paws and Homes pet adoption portal

servers:
  - url: /

paths:
  /:
    get:
      summary: Check backend status
      responses:
        "200":
          description: Backend is running
          content:
            text/plain:
              schema:
                type: string

  /api/message:
    get:
      summary: Get backend status message
      responses:
        "200":
          description: Backend status message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /api/pets:
    get:
      summary: Retrieve all pets
      responses:
        "200":
          description: Pet list retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"

    post:
      summary: Create a new pet
      responses:
        "201":
          description: Pet created successfully
        "401":
          description: Authentication required
        "403":
          description: Shelter Staff role required

  /api/pets/mine:
    get:
      summary: Retrieve pets created by the logged-in shelter staff user
      responses:
        "200":
          description: Staff pet listings retrieved successfully
        "401":
          description: Authentication required
        "403":
          description: Shelter Staff role required

  /api/pets/{id}:
    delete:
      summary: Delete a pet listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pet deleted successfully
        "401":
          description: Authentication required
        "403":
          description: Shelter Staff role required
        "404":
          description: Pet not found

components:
  schemas:
    Pet:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
          example: 1
        name:
          type: string
          example: Buddy
        species:
          type: string
          example: Dog
        breed:
          type: string
          example: Golden Retriever
        age:
          type: integer
          example: 3
        status:
          type: string
          example: Available
        createdBy:
          type: string
          example: shelter.staff@example.com